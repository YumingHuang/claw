server:
  host: "127.0.0.1"
  port: 9000
  read_timeout: 30s
  write_timeout: 60s
  shutdown_timeout: 10s

log:
  level: "debug"
  format: "text"
  output: "stdout"

system_prompt: "You are a helpful assistant."

session:
  ttl: 2h
  max_history: 50
  cleanup_interval: 10m

providers:
  default: "openai"
  list:
    - name: "openai"
      type: "openai"
      base_url: "https://api.openai.com/v1"
      api_key: "sk-test-key-1"
      model: "gpt-4"
      max_tokens: 4096
      temperature: 0.7
      timeout: 30s
      context_window: 8192
    - name: "anthropic"
      type: "anthropic"
      base_url: "https://api.anthropic.com/v1"
      api_key: "sk-ant-test-key"
      model: "claude-3-opus"
      max_tokens: 4096
      temperature: 0.8
      timeout: 45s
      context_window: 200000
  fallback_order:
    - "anthropic"
    - "openai"
  retry:
    max_attempts: 3
    backoff: 2s

tools:
  workdir: "/tmp/claw"
  allowed_commands:
    - "ls"
    - "cat"
    - "echo"
  max_output_chars: 5000
  timeout: 20s
  max_iterations: 5

channels:
  http:
    enabled: true
  websocket:
    enabled: true
    ping_interval: 30s
  feishu:
    enabled: false
    app_id: ""
    app_secret: ""
    long_connection: false

auth:
  enabled: true
  api_keys:
    - "test-key-1"
    - "test-key-2"

rate_limit:
  enabled: true
  requests_per_minute: 60
  burst: 10
