<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
  --border: #333; --text: #e0e0e0; --text2: #888;
  --accent: #6c9eff; --accent2: #4a7adf;
  --green: #4ec970; --orange: #e8a838; --red: #e85454;
  --radius: 12px; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; }

#app {
  display: flex; flex-direction: column; height: 100dvh; max-width: 860px;
  margin: 0 auto; padding: 0 16px;
}

/* Header */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
header h1 { font-size: 18px; font-weight: 600; }
header h1 span { color: var(--accent); }
#status {
  font-size: 12px; padding: 4px 10px; border-radius: 20px;
  background: var(--surface2); color: var(--text2);
}
#status.connected { color: var(--green); }
#status.error { color: var(--red); }

/* Messages */
#messages {
  flex: 1; overflow-y: auto; padding: 16px 0; display: flex;
  flex-direction: column; gap: 16px; scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg { display: flex; gap: 12px; max-width: 100%; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.msg.user { justify-content: flex-end; }
.msg.user .bubble {
  background: var(--accent2); color: #fff; border-radius: var(--radius) var(--radius) 4px var(--radius);
  max-width: 75%;
}
.msg.assistant .bubble {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) var(--radius) 4px; max-width: 85%;
}
.bubble { padding: 12px 16px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
.bubble code { font-family: var(--mono); font-size: 13px; background: var(--surface2); padding: 2px 6px; border-radius: 4px; }
.bubble pre { background: var(--surface2); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
.bubble pre code { background: none; padding: 0; }

.tool-status {
  font-size: 12px; color: var(--orange); padding: 6px 12px;
  background: rgba(232,168,56,0.08); border-radius: 8px; display: inline-block;
}
.thinking { font-size: 12px; color: var(--text2); padding: 6px 0; }
.thinking::after { content: ''; animation: dots 1.2s infinite; }
@keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }

.usage {
  font-size: 11px; color: var(--text2); margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* Input */
#input-area {
  flex-shrink: 0; padding: 12px 0 16px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-end;
}
#input-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
#input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px; color: var(--text);
  font-family: var(--font); font-size: 15px; resize: none;
  min-height: 48px; max-height: 200px; line-height: 1.5; outline: none;
  transition: border-color 0.2s;
}
#input:focus { border-color: var(--accent); }
#input::placeholder { color: var(--text2); }
#attach {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--surface2); color: var(--text2); cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: color 0.2s;
}
#attach:hover { color: var(--accent); }
#attach svg { width: 18px; height: 18px; }
#previews {
  display: flex; gap: 6px; flex-wrap: wrap;
}
#previews:empty { display: none; }
.preview {
  position: relative; width: 64px; height: 64px; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border);
}
.preview img { width: 100%; height: 100%; object-fit: cover; }
.preview .remove {
  position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
  background: rgba(0,0,0,0.7); color: #fff; border: none; border-radius: 50%;
  font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
#send {
  width: 48px; height: 48px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, opacity 0.2s;
}
#send:hover { background: var(--accent2); }
#send:disabled { opacity: 0.4; cursor: not-allowed; }
#send svg { width: 20px; height: 20px; }

/* Empty state */
.empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 14px; text-align: center; line-height: 1.8;
}
.msg-images { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.msg-images img { max-width: 200px; max-height: 160px; border-radius: 8px; object-fit: cover; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🐾 <span>Claw</span></h1>
    <div id="status">连接中…</div>
  </header>
  <div id="messages">
    <div class="empty">发送消息开始对话</div>
  </div>
  <div id="input-area">
    <input type="file" id="file-input" accept="image/*" multiple hidden>
    <button id="attach" title="添加图片" aria-label="添加图片">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <div id="input-wrap">
      <div id="previews"></div>
      <textarea id="input" rows="1" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)" autofocus></textarea>
    </div>
    <button id="send" title="发送">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const messagesEl = $('#messages');
const inputEl = $('#input');
const sendBtn = $('#send');
const statusEl = $('#status');
const attachBtn = $('#attach');
const fileInput = $('#file-input');
const previewsEl = $('#previews');

let ws = null;
let sessionID = localStorage.getItem('claw_session') || '';
let currentAssistantEl = null;
let currentContent = '';
let sending = false;
let pendingImages = []; // [{data, mediaType}]

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let url = `${proto}//${location.host}/v1/ws`;
  if (sessionID) url += `?session_id=${sessionID}`;

  ws = new WebSocket(url);

  ws.onopen = () => {
    statusEl.textContent = '已连接';
    statusEl.className = 'connected';
  };

  ws.onclose = () => {
    statusEl.textContent = '已断开';
    statusEl.className = 'error';
    sending = false;
    updateSendBtn();
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    statusEl.textContent = '连接错误';
    statusEl.className = 'error';
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'status':
        if (msg.session_id) {
          sessionID = msg.session_id;
          localStorage.setItem('claw_session', sessionID);
        }
        if (msg.status === 'thinking') {
          showThinking();
        } else if (msg.status === 'calling_tool') {
          showToolCall(msg.tool);
        }
        break;

      case 'chunk':
        if (msg.delta) appendDelta(msg.delta);
        if (msg.usage) showUsage(msg.usage);
        break;

      case 'done':
        if (msg.session_id) {
          sessionID = msg.session_id;
          localStorage.setItem('claw_session', sessionID);
        }
        finishAssistant();
        break;

      case 'error':
        showError(msg.message || msg.code || 'Unknown error');
        finishAssistant();
        break;

      case 'pong':
        break;
    }
  };
}

function send() {
  const text = inputEl.value.trim();
  if ((!text && pendingImages.length === 0) || !ws || ws.readyState !== 1 || sending) return;

  // Clear empty state
  const empty = messagesEl.querySelector('.empty');
  if (empty) empty.remove();

  addMessage('user', text, pendingImages);
  const payload = { type: 'message', content: text };
  if (pendingImages.length > 0) {
    payload.images = pendingImages.map(img => ({ data: img.data, media_type: img.mediaType }));
  }
  ws.send(JSON.stringify(payload));
  inputEl.value = '';
  inputEl.style.height = 'auto';
  pendingImages = [];
  previewsEl.innerHTML = '';
  sending = true;
  updateSendBtn();
}

function addMessage(role, content, images) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  let html = '<div class="bubble">';
  if (images && images.length > 0) {
    html += '<div class="msg-images">';
    for (const img of images) {
      html += `<img src="data:${img.mediaType};base64,${img.data}" alt="image">`;
    }
    html += '</div>';
  }
  if (content) html += escapeHtml(content);
  html += '</div>';
  div.innerHTML = html;
  messagesEl.appendChild(div);
  scrollBottom();
}

function showThinking() {
  removeThinking();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = '<div class="thinking" id="thinking">思考中</div>';
  messagesEl.appendChild(div);
  scrollBottom();
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.closest('.msg').remove();
}

function showToolCall(tool) {
  removeThinking();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `<div class="tool-status">🔧 调用工具: ${escapeHtml(tool)}</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function appendDelta(delta) {
  if (!currentAssistantEl) {
    removeThinking();
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = '<div class="bubble"></div>';
    messagesEl.appendChild(div);
    currentAssistantEl = div.querySelector('.bubble');
    currentContent = '';
  }
  currentContent += delta;
  currentAssistantEl.innerHTML = renderMarkdown(currentContent);
  scrollBottom();
}

function showUsage(usage) {
  if (!currentAssistantEl || !usage.total_tokens) return;
  let usageEl = currentAssistantEl.querySelector('.usage');
  if (!usageEl) {
    usageEl = document.createElement('div');
    usageEl.className = 'usage';
    currentAssistantEl.appendChild(usageEl);
  }
  usageEl.textContent = `tokens: ${usage.prompt_tokens} → ${usage.completion_tokens} (${usage.total_tokens})`;
}

function showError(msg) {
  removeThinking();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `<div class="bubble" style="border-color:var(--red);color:var(--red)">⚠️ ${escapeHtml(msg)}</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function finishAssistant() {
  currentAssistantEl = null;
  currentContent = '';
  sending = false;
  updateSendBtn();
}

function updateSendBtn() {
  sendBtn.disabled = sending || !ws || ws.readyState !== 1;
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMarkdown(text) {
  // Minimal markdown: code blocks, inline code, bold, links
  let html = escapeHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  return html;
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', send);

// Image upload
attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  for (const file of fileInput.files) {
    if (!file.type.startsWith('image/')) continue;
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      pendingImages.push({ data: base64, mediaType: file.type });
      const wrap = document.createElement('div');
      wrap.className = 'preview';
      const idx = pendingImages.length - 1;
      wrap.innerHTML = `<img src="${reader.result}"><button class="remove" data-idx="${idx}">&times;</button>`;
      previewsEl.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  }
  fileInput.value = '';
});
previewsEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.remove');
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx);
  btn.closest('.preview').remove();
  pendingImages[idx] = null;
  pendingImages = pendingImages.filter(Boolean);
  // Re-index remaining buttons
  previewsEl.querySelectorAll('.remove').forEach((b, i) => b.dataset.idx = i);
});

// Paste image from clipboard
inputEl.addEventListener('paste', (e) => {
  for (const item of e.clipboardData.items) {
    if (!item.type.startsWith('image/')) continue;
    e.preventDefault();
    const file = item.getAsFile();
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      pendingImages.push({ data: base64, mediaType: file.type });
      const wrap = document.createElement('div');
      wrap.className = 'preview';
      const idx = pendingImages.length - 1;
      wrap.innerHTML = `<img src="${reader.result}"><button class="remove" data-idx="${idx}">&times;</button>`;
      previewsEl.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  }
});

// Keepalive ping
setInterval(() => {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'ping' }));
  }
}, 25000);

connect();
</script>
</body>
</html>
