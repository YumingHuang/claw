# Claw 配置文件示例
# 复制此文件为 config.yaml 并根据需要修改
# 支持环境变量替换：${VAR_NAME} 会被替换为对应环境变量的值

server:
  host: "0.0.0.0"          # 监听地址
  port: 8080               # 监听端口
  read_timeout: 30s        # HTTP 读超时
  write_timeout: 120s      # HTTP 写超时（需留足 LLM 响应时间）
  shutdown_timeout: 15s    # 优雅关闭超时

log:
  level: "info"            # 日志级别：debug | info | warn | error
  format: "json"           # 日志格式：json | text
  output: "stdout"         # 日志输出：stdout | stderr | 文件路径

audit:
  enabled: false           # 是否启用审计日志
  output: "logs/audit.log" # 审计日志文件
  max_value_chars: 256     # 审计字段最大长度，超出会截断脱敏

# 系统 Prompt，定义 AI 助手的行为
# 提示：详细的 system prompt 能显著提升回复质量，建议包含：
# - 核心行为（主动思考、完整回答）
# - 工具使用指引（何时调用 memory/search/file 等工具）
# - 回复风格（语言、语气、格式）
system_prompt: |
  你是 Claw，一个智能个人助手。

  ## 核心行为
  - 主动思考用户问题背后的真实意图，不要只回答表面问题
  - 给出完整、有条理的回答，必要时分步骤说明
  - 如果用户的问题模糊，先给出最可能的回答，再简要补充其他可能性
  - 主动提供相关的补充信息和建议，而不是等用户追问
  - 当涉及多步操作时，一次性给出完整方案

  ## 工具使用
  - 需要查时间、读写文件、执行命令时，主动调用工具，不要让用户手动操作
  - 可以组合多个工具完成复杂任务
  - 当用户提到偏好、习惯、个人信息时，用 memory_set 记住；后续对话用 memory_get 回忆

  ## 风格
  - 像一个经验丰富的同事在对话，自然、直接
  - 不确定时坦诚说明，但同时给出最佳建议
  - 中文回复，技术术语可保留英文

session:
  ttl: 1h                 # 会话过期时间
  max_history: 100        # 最大历史消息条数
  cleanup_interval: 5m    # 过期会话清理间隔
  sqlite_path: ""         # 可选：SQLite 持久化路径，需绝对路径；session 与 memory_* 共用

providers:
  default: "openai"       # 默认使用的 provider 名称
  list:
    # OpenAI 兼容接口（如 OpenAI、Azure OpenAI、本地 Ollama 等）
    - name: "openai"
      type: "openai_compatible"
      base_url: "https://api.openai.com/v1"
      api_key: "${OPENAI_API_KEY}"      # 支持环境变量引用
      model: "gpt-4o"
      max_tokens: 4096
      temperature: 0.7
      timeout: 60s
      context_window: 128000            # 模型上下文窗口大小

    # 备用 Provider（可选）
    - name: "backup"
      type: "openai_compatible"
      base_url: "https://api.backup.com/v1"
      api_key: "${BACKUP_API_KEY}"
      model: "gpt-4o-mini"
      max_tokens: 4096
      temperature: 0.7
      timeout: 30s
      context_window: 128000

  # 故障转移顺序：当主 provider 失败时，依次尝试以下 provider
  fallback_order: ["openai", "backup"]

  # 重试配置
  retry:
    max_attempts: 2        # 最大重试次数
    backoff: "1s"          # 指数退避基础间隔

tools:
  workdir: "/home/user/workspace"       # 文件操作沙箱根目录（必须是绝对路径）
  allowed_commands:                      # run_command 工具的命令白名单
    - "ls"
    - "cat"
    - "date"
    - "wc"
    - "head"
    - "tail"
    - "grep"
    - "find"
  max_output_chars: 10000               # 工具输出最大字符数
  timeout: 30s                           # 单次工具调用超时
  max_iterations: 10                     # Agent 循环最大轮数
  tavily_api_key: "${TAVILY_API_KEY}"    # Tavily 搜索 API Key（https://tavily.com 免费注册）
  default_profile: "default"             # 默认工具权限配置
  profiles:
    default:
      - "get_current_time"
      - "memory_get"
      - "memory_set"
      - "memory_list"
      - "read_file"
      - "write_file"
      - "run_command"
      - "web_search"

# MCP (Model Context Protocol) 外部工具服务器
# 支持 stdio（本地进程）和 sse（远程 HTTP）两种方式
mcp:
  servers: []
  # 示例 - 文件系统工具（stdio）:
  # - name: "filesystem"
  #   type: "stdio"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/your/workspace"]
  #
  # 示例 - 远程 SSE 服务器:
  # - name: "my-mcp-server"
  #   type: "sse"
  #   url: "http://localhost:3000/sse"

# 定时任务：按 cron 表达式定时向 agent 发送消息
# schedule 使用标准 5 位 cron 表达式（分 时 日 月 周）
cron:
  jobs: []
  # - name: "daily_stock"
  #   schedule: "0 18 * * 1-5"
  #   message: "帮我分析一下今天的大盘走势"
  #   channel: "cron"              # 可选，默认 "cron"

channels:
  # HTTP 通道配置
  http:
    enabled: true

  # WebSocket 通道配置
  websocket:
    enabled: false
    ping_interval: 30s                   # WebSocket 心跳间隔

  # 飞书 Bot 通道配置
  feishu:
    enabled: false
    app_id: "${FEISHU_APP_ID}"           # 飞书应用 App ID
    app_secret: "${FEISHU_APP_SECRET}"   # 飞书应用 App Secret
    long_connection: false               # true 时主动建立长连接收事件，无需回调地址；false 时使用 Webhook
    verification_token: "${FEISHU_VERIFICATION_TOKEN}" # Webhook 事件订阅校验 token；长连接模式下可留空
    encrypt_key: "${FEISHU_ENCRYPT_KEY}" # Webhook 可选事件加密 key；长连接模式下通常留空
    thinking_emoji: "THINKING"           # 思考中 reaction 表情类型，参考飞书 emoji 枚举

auth:
  enabled: false                          # 是否启用 API Key 认证
  api_keys:
    - "${CLAW_API_KEY}"                  # 允许的 API Key 列表

rate_limit:
  enabled: false                          # 是否启用速率限制
  requests_per_minute: 30                # 每分钟最大请求数
  burst: 5                               # 突发请求允许的并发数
